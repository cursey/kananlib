# Reference: https://build-cpp.github.io/cmkr/cmake-toml
[project]
name = "kananlibtest"
cmake-before=""" 
add_compile_options($<$<CXX_COMPILER_ID:MSVC>:/MP>)

# mklink the parent dir as kananlib/ with command line stuff
set(TARGET_DIR "${CMAKE_CURRENT_SOURCE_DIR}")
set(KANANLIB_USE_DIA_SDK ON CACHE BOOL "" FORCE)

execute_process(
    COMMAND cmd /c mklink /J kananlib ..
    WORKING_DIRECTORY ${TARGET_DIR}
    RESULT_VARIABLE result
    OUTPUT_VARIABLE output
    ERROR_VARIABLE error_output
)
"""
cmake-after="""
enable_testing()
message(STATUS ${PROJECT_SOURCE_DIR})
"""

[fetch-content.bddisasm]
git = "https://github.com/bitdefender/bddisasm"
tag = "v1.37.0"
shallow = true

[fetch-content.spdlog]
git = "https://github.com/gabime/spdlog"
tag = "v1.12.0"
shallow = true

[template.kananlib-test-template]
type = "executable"
include-directories = ["include"]
compile-features = ["cxx_std_20"]
compile-options = ["/EHa"]
link-libraries = [
    "bddisasm::bddisasm",
    "bddisasm::bdshemu",
    "spdlog::spdlog", 
    "shlwapi",
    "kananlib"
]
cmake-before="""
if(NOT TARGET kananlib)
    add_subdirectory(kananlib)
endif()
"""
cmake-after="""
add_test(NAME ${CMKR_TARGET} COMMAND ${CMKR_TARGET})
"""

[target.kananlib-test]
type = "kananlib-test-template"
sources = ["Main.cpp"]

# Stress tests for exhaustive_decode and collect_basic_blocks
[target.kananlib-stress-test]
type = "kananlib-test-template"
sources = ["StressTest.cpp"]

# Tests for utility modules: Pattern, String, Address, Config
[target.kananlib-utils-test]
type = "kananlib-test-template"
sources = ["TestUtils.cpp"]

# Tests for advanced modules: ScopeGuard, Benchmark, Memory, Patch, PointerHook
[target.kananlib-advanced-test]
type = "kananlib-test-template"
sources = ["TestAdvanced.cpp"]

# Test for VtableHook
[target.kananlib-vtablehook-test]
type = "kananlib-test-template"
sources = ["TestVtableHook.cpp"]

# Test for Input
[target.kananlib-input-test]
type = "kananlib-test-template"
sources = ["TestInput.cpp"]

# Test for Registry
[target.kananlib-registry-test]
type = "kananlib-test-template"
sources = ["TestRegistry.cpp"]

# Test for Module utilities
[target.kananlib-module-test]
type = "kananlib-test-template"
sources = ["TestModule.cpp"]

# Test for additional Scan functions
[target.kananlib-scan-test]
type = "kananlib-test-template"
sources = ["TestScan.cpp"]

# Test for PDB + RTTI deep coverage
[target.kananlib-pdb-rtti-test]
type = "kananlib-test-template"
sources = ["TestPDBRTTI.cpp"]
compile-definitions = ["KANANLIB_USE_DIA_SDK"]

# Test for Emulation (bddisasm ShemuContext)
[target.kananlib-emulation-test]
type = "kananlib-test-template"
sources = ["TestEmulation.cpp"]

# Regression tests for bugs found during API audit
[target.kananlib-bug-regression-test]
type = "kananlib-test-template"
sources = ["TestBugRegression.cpp"]