compile-features = ["cxx_std_20"]
compile-options = ["/EHa"]
link-libraries = [
    "bddisasm::bddisasm",
    "spdlog::spdlog",
    "shlwapi",
    "kananlib"
]
cmake-before="""
if(NOT TARGET kananlib)
    add_subdirectory(kananlib)
endif()
"""

